name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.14"

    - name: Install dependencies
      run: UV_GIT_LFS=1 uv sync --dev

    - name: Run tests
      env:
        LIVEKIT_URL: "wss://fake-url-for-testing.com"
        LIVEKIT_API_KEY: "fake-key-for-testing"
        LIVEKIT_API_SECRET: "fake-secret-for-testing"
      run: uv run pytest -v